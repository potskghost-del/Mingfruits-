<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MING FRUITS - SHOP CÀY THUÊ</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
    
        /* =========================================================
   1. CÀI ĐẶT CHUNG & BẢNG MÀU GAMING NEON (ĐẸP HƠN)
   ========================================================= */
:root { 
    --p: #00f2ff; /* Xanh Neon Cyan - Chính */
    --s: #7000ff; /* Tím Neon Purple - Phụ */
    --success: #00ff88; /* Xanh lá Neon - Thành công */
    --warning: #ff9800; /* Cam Neon - Chờ duyệt */
    --danger: #ff4444; /* Đỏ Neon - Hủy đơn/Admin */
    --bg: #050505; /* Nền tối sâu */
    --card: #121212; /* Nền của các ô dịch vụ */
    --text: #ffffff; /* Chữ trắng */
}

* { 
    box-sizing: border-box; 
    font-family: 'Quicksand', sans-serif; 
    margin: 0; padding: 0; 
    /* YÊU CẦU 2: Làm cho tất cả chữ đậm hơn mặc định */
    font-weight: 700; 
}

/* =========================================================
   2. THÂN WEB - MỞ KHÓA VUỐT & XOÁ KHOẢNG TRỐNG
   ========================================================= */
body {
    background-color: var(--bg);
    background-image: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050505 100%); /* Tạo chiều sâu nền */
    color: var(--text);
    
    /* Mở khóa vuốt màn hình để reload trang */
    min-height: 101vh; 
    overflow-y: auto !important;
    overflow-x: hidden !important;
    -webkit-overflow-scrolling: touch;

    /* Căn giữa toàn bộ shop ra giữa màn hình */
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 15px 10px !important;
    position: relative;
}

/* Bỏ hoàn toàn nền rồng chuyển động cũ */
body::before { display: none !important; content: none !important; }

/* =========================================================
   3. KHUNG CHỨA SHOP - BỐ CỤC RÕ RÀNG (CHÍNH GIỮA)
   ========================================================= */
.container {
    width: 100%;
    max-width: 500px; /* Độ rộng chuẩn shop mobile */
    display: flex;
    flex-direction: column;
    gap: 20px; /* Tạo khoảng cách rõ ràng giữa các phần */
    padding-bottom: 40px;
}

/* =========================================================
   4. THIẾT KẾ CÁC BOX - YÊU CẦU 1: VIỀN BO TRÒN XUNG QUANH
   ========================================================= */
.box {
    width: 100%;
    background: var(--card);
    /* YÊU CẦU 1: VIỀN BO TRÒN */
    border-radius: 15px; 
    padding: 22px;
    border: 1px solid rgba(255, 255, 255, 0.05); /* Viền mờ bao quanh */
    border-top: 3px solid var(--p); /* Viền trên Neon làm điểm nhấn */
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6); /* Bóng đổ tạo khối */
    transition: 0.3s ease;
}

/* Hiệu ứng khi di chuột vào khối (trên PC) */
.box:hover {
    border-top-color: var(--s); /* Đổi màu viền trên sang tím */
    transform: translateY(-2px);
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.7);
}

/* =========================================================
   5. TIÊU ĐỀ & CHỮ TRONG BOX - YÊU CẦU 2 & 3: ĐẬM & MÀU ĐẸP
   ========================================================= */
header { text-align: center; padding: 20px 0; margin-bottom: 10px; }
.logo { 
    font-family: 'Orbitron'; 
    font-size: 1.8rem; 
    font-weight: 700;
    color: var(--p); /* YÊU CẦU 3: MÀU ĐẸP RỰC RỠ */
    text-shadow: 0 0 15px var(--p); 
    letter-spacing: 2px; 
    text-transform: uppercase;
}

.box h2, .box h3, .box h4 {
    font-family: 'Orbitron';
    text-align: center;
    text-transform: uppercase;
    font-size: 1.1rem;
    font-weight: 700; /* YÊU CẦU 2: CHỮ ĐẬM */
    margin-bottom: 20px;
    color: var(--p); /* YÊU CẦU 3: MÀU XANH NEON */
    letter-spacing: 1px;
    text-shadow: 0 0 10px rgba(0, 242, 255, 0.3);
}

/* Ô tiền mặt đẹp hơn */
.balance { 
    color: var(--success) !important; 
    font-family: 'Orbitron'; 
    font-weight: 700;
    font-size: 1.2rem;
    text-shadow: 0 0 10px var(--success);
}

/* =========================================================
   6. INPUT & SELECT - BỐ CỤC RÕ RÀNG, DỄ NHÌN
   ========================================================= */
input, select, textarea {
    width: 100%;
    padding: 14px;
    margin-bottom: 15px;
    background: #000;
    border: 1px solid #333;
    color: #fff;
    /* VIỀN BO TRÒN */
    border-radius: 10px; 
    outline: none;
    font-size: 0.95rem;
    font-weight: 700; /* YÊU CẦU 2: ĐẬM */
    transition: 0.3s ease;
}

input:focus, select:focus {
    border-color: var(--p);
    background: #111;
    box-shadow: 0 0 10px rgba(0, 242, 255, 0.3);
}

/* =========================================================
   7. NÚT BẤM GAMING STYLE - ĐẬM & MÀU RỰC RỠ
   ========================================================= */
.btn {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 10px; /* VIỀN BO TRÒN */
    font-weight: 700; /* YÊU CẦU 2: CHỮ ĐẬM */
    cursor: pointer;
    text-transform: uppercase;
    font-family: 'Orbitron';
    transition: 0.3s;
    letter-spacing: 1px;
}

.btn-p { 
    background: linear-gradient(90deg, #00f2ff, #0072ff); 
    color: #000; 
    box-shadow: 0 0 15px rgba(0, 242, 255, 0.5); /* YÊU CẦU 3: MÀU ĐẸP RỰC RỠ */
}

.btn-s { 
    background: #1a1a1a;
    border: 1px solid var(--s);
    color: var(--s); 
    box-shadow: 0 0 10px rgba(112, 0, 255, 0.3); 
}

.btn:active { transform: scale(0.96); }

/* =========================================================
   8. LỊCH SỬ GIAO DỊCH - BỐ CỤC CHUYÊN NGHIỆP
   ========================================================= */
#history-list {
    max-height: 250px;
    overflow-y: auto;
    padding-right: 5px;
}

.history-item {
    font-size: 0.85rem;
    background: #1a1a1a;
    padding: 12px;
    border-radius: 8px; /* VIỀN BO TRÒN */
    margin-bottom: 10px;
    border-left: 3px solid var(--s); /* Điểm nhấn tím */
    color: #ccc;
    font-weight: 700; /* YÊU CẦU 2: ĐẬM */
    transition: 0.2s;
}

.history-item:hover {
    background: #222;
    transform: translateX(2px);
}

/* =========================================================
   9. MENU ADMIN - VIỀN BO ĐẶC BIỆT
   ========================================================= */
#admin-section {
    /* YÊU CẦU 1: VIỀN BO TRÒN ĐẶC BIỆT */
    border: 2px dashed var(--danger) !important; 
    background: rgba(26, 0, 0, 0.9);
    border-top: none !important;
    border-radius: 15px;
}

#admin-section h3 {
    color: var(--danger) !important;
    text-shadow: 0 0 10px var(--danger);
}

/* CÁC THẺ TRẠNG THÁI TRONG LỊCH SỬ */
.tag-pending { color: var(--warning); font-weight: 700; }
.tag-done { color: var(--success); font-weight: 700; }
.tag-card { color: #ff00ea; font-weight: 700; }
.tag-system { color: #00ffff; font-weight: 700; }

.hidden { display: none !important; }

/* Hiệu ứng chữ cho giá tiền khi chọn dịch vụ */
.price-display {
    text-align: center;
    margin: 10px 0;
    font-size: 1.5rem;
    color: var(--p);
    font-weight: 700; /* YÊU CẦU 2: ĐẬM */
    font-family: 'Orbitron';
    text-shadow: 0 0 10px var(--p);
}
        /* --- CHỈ THÊM ĐOẠN NÀY VÀO STYLE --- */
.nav-menu {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    margin-bottom: 20px;
}

.nav-btn {
    height: 100px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: #151515;
    border: 2px solid #333;
    border-radius: 15px; /* Bo tròn viền */
    cursor: pointer;
    transition: 0.3s;
    border-bottom: 4px solid #00f2ff; /* Điểm nhấn Neon */
}

.nav-btn span {
    font-family: 'Orbitron';
    font-weight: 900; /* Chữ siêu đậm */
    font-size: 0.9rem;
    color: #fff;
    text-transform: uppercase;
}

.nav-btn:active { transform: scale(0.95); background: #222; }

/* Nút quay lại nhỏ xinh */
.back-btn {
    background: #222;
    color: #00f2ff;
    border: 1px solid #00f2ff;
    padding: 8px 15px;
    border-radius: 8px;
    font-weight: bold;
    margin-bottom: 15px;
    cursor: pointer;
    font-size: 12px;
}

.hidden { display: none !important; }
        
</style>
    
</head>

<script>
    function showTab(tabName) {
    document.getElementById('hub-menu').classList.add('hidden'); // Ẩn 2 nút chọn
    if(tabName === 'service') {
        document.getElementById('service-area').classList.remove('hidden');
    } else {
        document.getElementById('topup-area').classList.remove('hidden');
    }
}

function backToHub() {
    document.getElementById('hub-menu').classList.remove('hidden'); // Hiện lại 2 nút
    document.getElementById('service-area').classList.add('hidden');
    document.getElementById('topup-area').classList.add('hidden');
}
    
    let currentUser = localStorage.getItem('sessionUser');

    // Chạy khi trang web tải xong
    window.onload = function() { 
        if(currentUser) {
            showMain(); 
        }
    }

    function register() {
        const u = document.getElementById('user-input').value.trim();
        const p = document.getElementById('pass-input').value.trim();
        if(u.length < 3) return alert("Tên tài khoản phải từ 3 ký tự!");
        if(localStorage.getItem(u)) return alert("Tài khoản này đã tồn tại!");
        localStorage.setItem(u, JSON.stringify({ pass: p, balance: 0, history: [] }));
        alert("Đăng ký thành công!");
    }

    function login() {
        const u = document.getElementById('user-input').value.trim();
        const p = document.getElementById('pass-input').value.trim();
        const data = JSON.parse(localStorage.getItem(u));
        if(data && data.pass === p) {
            currentUser = u;
            localStorage.setItem('sessionUser', u);
            showMain();
        } else alert("Sai tài khoản hoặc mật khẩu!");
    }

    function showMain() {
        document.getElementById('auth-box').classList.add('hidden');
        document.getElementById('main-content').classList.remove('hidden');
        refreshUserUI();
    }

    function refreshUserUI() {
        const data = JSON.parse(localStorage.getItem(currentUser));
        if(!data) return;
        document.getElementById('display-name').innerText = "Chào, " + currentUser;
        document.getElementById('display-balance').innerText = data.balance.toLocaleString() + "đ";
        document.getElementById('form-user').value = currentUser;
        loadHistory(); // Gọi hàm này để hiện lịch sử
    }


    function updatePrice() {
        const s = document.getElementById('service');
        const price = s.options[s.selectedIndex].getAttribute('data-price');
        document.getElementById('price-txt').innerText = parseInt(price).toLocaleString() + "đ";
        document.getElementById('hidden-price').value = parseInt(price).toLocaleString() + "đ";
    }

    function validatePurchase() {
    const s = document.getElementById('service');
    const price = parseInt(s.options[s.selectedIndex].getAttribute('data-price'));
    const data = JSON.parse(localStorage.getItem(currentUser));
    if(price === 0) { alert("Chọn dịch vụ!"); return false; }
    if(data.balance < price) { alert("Không đủ tiền!"); return false; }

    data.balance -= price;
    // Thêm chữ [ĐANG CHỜ] để admin còn biết mà duyệt
    data.history.unshift(`<span style="color: #ff9800;">[ĐANG CHỜ]</span> ${s.value} (-${price.toLocaleString()}đ)`);
    localStorage.setItem(currentUser, JSON.stringify(data));
    refreshUserUI();
    alert("Mua thành công! Vui lòng đợi Admin vào cày.");
    return true;
    }
    

    function validateCard() {
        const seri = document.getElementById('card-seri').value.trim();
        const code = document.getElementById('card-code').value.trim();
        const val = document.getElementById('card-value').value;
        const type = document.getElementById('card-type').value;
        if(seri === "" || code === "") { alert("Nhập đủ thông tin!"); return false; }

        const data = JSON.parse(localStorage.getItem(currentUser));
        const log = `<span style="color: #ff9800;">[CHỜ DUYỆT]</span> ${type} ${parseInt(val).toLocaleString()}đ`;
        data.history.unshift(log);
        localStorage.setItem(currentUser, JSON.stringify(data));
        alert("Gửi thẻ thành công!");
        return true;
    }

        function checkPendingMoney() {
    const target = document.getElementById('admin-target-user').value.trim();
    const infoDiv = document.getElementById('admin-pending-info');
    let userData = localStorage.getItem(target);

    if (userData && infoDiv) {
        let data = JSON.parse(userData);
        let total = 0;
        if (data.history) {
            data.history.forEach(item => {
                // Chỉ quét những dòng có chữ [CHỜ DUYỆT]
                if (item.includes('[CHỜ DUYỆT]')) {
                    // Tách lấy phần số đứng trước chữ 'đ' và xóa dấu chấm
                    let parts = item.split(' '); 
                    let priceStr = parts[parts.length - 1]; // Lấy phần cuối cùng (ví dụ: 10.000đ)
                    let cleanNumber = priceStr.replace(/\./g, '').replace('đ', '');
                    
                    let num = parseInt(cleanNumber);
                    if (!isNaN(num)) total += num;
                }
            });
        }
        
        if (total > 0) {
            infoDiv.innerHTML = `💰 Đang nạp: ${total.toLocaleString()}đ`;
            document.getElementById('admin-amount').value = total;
        } else {
            infoDiv.innerHTML = "❌ Không có tiền chờ";
            document.getElementById('admin-amount').value = "";
        }
    } else if (infoDiv) {
        infoDiv.innerHTML = "";
    }
    }
    
    function adminUpdate(type) {
        const target = document.getElementById('admin-target-user').value.trim();
        let amount = parseInt(document.getElementById('admin-amount').value);
        if (!target || isNaN(amount)) return alert("Nhập đủ tên và số tiền!");

        let userData = localStorage.getItem(target);
        if (userData) {
            let data = JSON.parse(userData);
            let finalAmount = (type === 1) ? amount : -amount;
            data.balance += finalAmount;
            
            // Sửa lỗi đóng ngoặc ở đây (Thay cho đoạn trong ảnh 6723)
            if (type === 1) {
                data.history = data.history.map(item => {
                    return item.replace('[CHỜ DUYỆT]', '<b style="color: #00ff88;">[ĐÃ XONG]</b>');
                });
            }
            
            data.history.unshift(`<span style="color: #00ff88;">[HỆ THỐNG]</span> ${finalAmount > 0 ? '+' : ''}${finalAmount.toLocaleString()}đ`);
            localStorage.setItem(target, JSON.stringify(data));
            alert("Thành công!");
            location.reload();
        } else alert("Sai tài khoản!");
    }

    function adminReject() {
        const target = document.getElementById('admin-target-user').value.trim();
        let userData = localStorage.getItem(target);
        if (userData) {
            let data = JSON.parse(userData);
            data.history = data.history.map(item => item.replace('[CHỜ DUYỆT]', '<b style="color: #ff4444;">[THẺ SAI/HỦY]</b>'));
            localStorage.setItem(target, JSON.stringify(data));
            alert("Đã hủy đơn!");
            location.reload();
        }
    }

    function loadHistory() {
        const data = JSON.parse(localStorage.getItem(currentUser));
        const list = document.getElementById('history-list');
        if(data && data.history && data.history.length > 0) {
            list.innerHTML = data.history.map(h => `<div class="history-item">${h}</div>`).join('');
        } else {
            list.innerHTML = '<div class="history-item">Chưa có giao dịch.</div>';
        }
    }

    function checkAdmin() {
        let p = prompt("Mã Admin:");
        if(p === "123456") document.getElementById('admin-section').style.display = 'block';
    }

    function logout() {
        localStorage.removeItem('sessionUser');
        location.reload();
    }
</script>
</body>
