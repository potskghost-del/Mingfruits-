<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MING FRUITS - SHOP CÀY THUÊ</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
    margin: 0;
    padding: 10px;
    line-height: 1.6;
    color: var(--text);
    height: 100vh; /* Chiều cao cố định bằng màn hình */
    overflow: hidden; /* Ẩn các phần thừa của ảnh nền */
    position: relative;
}

/* TẠO LỚP NỀN RIÊNG ĐỂ CHUYỂN ĐỘNG */
body::before {
    content: "";
    position: fixed;
    /* Làm cho ảnh nền to hơn màn hình 20% để có không gian di chuyển */
    top: -10%; 
    left: -10%;
    width: 120%;
    height: 120%;
    
    /* Dán link ảnh Rồng của bạn vào đây */
    background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRJ89uI6jwOxXEapNmT2mpEJDbMQagObNGIZommdkak0Q&s=10');
    
    /* Thuộc tính cơ bản cho nền */
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    
    /* Lớp phủ đen mờ 60% để nổi bật chữ */
    background-color: rgba(0, 0, 0, 0.6);
    background-blend-mode: darken; /* Hòa trộn màu đen vào ảnh */
    
    z-index: -1; /* Nằm dưới cùng */
    
    /* KÍCH HOẠT ANIMATION */
    /* Tên: moveBackground, Thời gian: 5s, Kiểu: nhẹ nhàng, Lặp: vô hạn */
    animation: moveBackground 20s ease-in-out infinite;
}

/* ĐỊNH NGHĨA CHUYỂN ĐỘNG */
@keyframes moveBackground {
    0%, 100% {
        /* Vị trí ban đầu: hơi lệch sang trái và lên trên */
        transform: translate(0, 0);
    }
    50% {
        /* Đến giữa chu kỳ: lệch sang phải và xuống dưới */
        transform: translate(5%, 5%);
    }
}
        
        :root { --p: #00f2ff; --s: #7000ff; --bg: #050505; --card: #111; --text: #fff; }
        * { box-sizing: border-box; font-family: 'Quicksand', sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 10px; line-height: 1.6; }
        header { text-align: center; padding: 20px 0; border-bottom: 2px solid var(--p); margin-bottom: 20px; }
        .logo { font-family: 'Orbitron'; font-size: 1.8rem; color: var(--p); text-shadow: 0 0 15px var(--p); letter-spacing: 2px; }
        .container { max-width: 550px; margin: auto; display: flex; flex-direction: column; gap: 15px; }
        .box { 
    background: rgba(10, 10, 10, 0.85); 
    border: 1px solid transparent;
    border-radius: 15px; 
    padding: 20px; 
    position: relative;
    backdrop-filter: blur(10px); /* Hiệu ứng kính mờ */
}

.box::before {
    content: "";
    position: absolute;
    top: -2px; left: -2px; right: -2px; bottom: -2px;
    background: linear-gradient(45deg, #00f2ff, #7000ff, #00f2ff);
    z-index: -1;
    border-radius: 17px;
    background-size: 400%;
    animation: borderGlow 5s linear infinite;
    opacity: 0.5;
}

@keyframes borderGlow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}
        { background: var(--card); border: 1px solid #222; border-radius: 15px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .hidden { display: none; }
        input, select, textarea { width: 100%; padding: 14px; margin-bottom: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 10px; font-size: 0.95rem; outline: none; transition: 0.3s; }
        input:focus, select:focus { border-color: var(--p); box-shadow: 0 0 8px var(--p); }
        .user-info { display: flex; justify-content: space-between; align-items: center; background: linear-gradient(90deg, #1a1a1a, #000); padding: 15px; border-radius: 10px; margin-bottom: 10px; border: 1px solid var(--p); }
        .balance { color: var(--p); font-weight: bold; font-family: 'Orbitron'; font-size: 1.1rem; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; text-transform: uppercase; font-family: 'Orbitron'; transition: 0.3s; letter-spacing: 1px; }
        .btn-p { background: var(--p); color: #000; box-shadow: 0 0 10px var(--p); }
        .btn-s { background: var(--s); color: #fff; margin-top: 5px; box-shadow: 0 0 10px var(--s); }
        .btn:active { transform: scale(0.96); }
        .price-display { text-align: center; margin: 10px 0; font-size: 1.4rem; color: var(--p); font-weight: bold; font-family: 'Orbitron'; text-shadow: 0 0 5px var(--p); }
        .history-item { font-size: 0.8rem; border-bottom: 1px solid #333; padding: 12px 0; color: #ccc; }
        .tag-buy { color: #ff00ea; font-weight: bold; }
        .tag-card { color: #00ff88; font-weight: bold; }
        optgroup { background: #111; color: var(--p); font-style: normal; }

    /* Lớp phủ đen mờ 70% để làm nổi bật chữ và bảng chọn */

    margin: 0;

        }
        
    </style>

    <option value="Lấy Áo Choàng Râu Đen (45k)" data-price="45000">Lấy Áo Choàng Râu Đen (45k)</option>

                    <optgroup label="➕ DỊCH VỤ KHÁC">
                       <option value ="lấy tộc quỷ+up v3" data-price="30000">lấy tộc quỷ+up v3(30k)</option>

                (35k)</option>

    <option value="Draco V4 Full Gear (PK + 500 Mas)" data-price="100000">Draco V4 Full Gear (Dragon Heart và Storm phải có trước 500 Mas) (100k)</option>

                <div class="price-display" id="price-txt">0đ</div>

            <h3 style="margin:0 0 15px; font-size: 0.9rem; color: #7000ff; font-family: 'Orbitron'; text-align: center;">NẠP THẺ CÀO (AUTO)</h3>
            <form action="https://formspree.io/f/xkoqpjgj" method="POST" onsubmit="return validateCard()">
                <input type="hidden" name="Loai_Don" value="Nạp Thẻ">
                <select name="Nha_Mang" id="card-type"><option>Viettel</option><option>Vinaphone</option><option>Mobifone</option></select>
                <select name="Menh_Gia" id="card-value">
                    <option value="10000">10.000đ</option><option value="20000">20.000đ</option><option value="50000">50.000đ</option>

    <div style="display: flex; gap: 5px; margin-top: 5px;">
    <button class="btn" style="background: #2196F3; color: #fff; flex: 1; font-size: 0.7rem;" onclick="adminStatus('ĐANG CÀY')">BẮT ĐẦU CÀY</button>
    <button class="btn" style="background: #00ff88; color: #000; flex: 1; font-size: 0.7rem;" onclick="adminStatus('HOÀN THÀNH')">XONG ĐƠN</button>
    </div>
    
<script>
    let currentUser = localStorage.getItem('sessionUser');

    // Chạy khi trang web tải xong
    window.onload = function() { 
        if(currentUser) {
            showMain(); 
        }
    }

    function register() {
        const u = document.getElementById('user-input').value.trim();
        const p = document.getElementById('pass-input').value.trim();
        if(u.length < 3) return alert("Tên tài khoản phải từ 3 ký tự!");
        if(localStorage.getItem(u)) return alert("Tài khoản này đã tồn tại!");
        localStorage.setItem(u, JSON.stringify({ pass: p, balance: 0, history: [] }));
        alert("Đăng ký thành công!");
    }

    function login() {
        const u = document.getElementById('user-input').value.trim();
        const p = document.getElementById('pass-input').value.trim();
        const data = JSON.parse(localStorage.getItem(u));
        if(data && data.pass === p) {
            currentUser = u;
            localStorage.setItem('sessionUser', u);
            showMain();
        } else alert("Sai tài khoản hoặc mật khẩu!");
    }

    function showMain() {
        document.getElementById('auth-box').classList.add('hidden');
        document.getElementById('main-content').classList.remove('hidden');
        refreshUserUI();
    }

    function refreshUserUI() {
        const data = JSON.parse(localStorage.getItem(currentUser));
        if(!data) return;
        document.getElementById('display-name').innerText = "Chào, " + currentUser;
        document.getElementById('display-balance').innerText = data.balance.toLocaleString() + "đ";
        document.getElementById('form-user').value = currentUser;
        loadHistory(); // Gọi hàm này để hiện lịch sử
    }


    function updatePrice() {
        const s = document.getElementById('service');
        const price = s.options[s.selectedIndex].getAttribute('data-price');
        document.getElementById('price-txt').innerText = parseInt(price).toLocaleString() + "đ";
        document.getElementById('hidden-price').value = parseInt(price).toLocaleString() + "đ";
    }

    function validatePurchase() {
    const s = document.getElementById('service');
    const price = parseInt(s.options[s.selectedIndex].getAttribute('data-price'));
    const data = JSON.parse(localStorage.getItem(currentUser));
    if(price === 0) { alert("Chọn dịch vụ!"); return false; }
    if(data.balance < price) { alert("Không đủ tiền!"); return false; }

    data.balance -= price;
    // Thêm chữ [ĐANG CHỜ] để admin còn biết mà duyệt
    data.history.unshift(`<span style="color: #ff9800;">[ĐANG CHỜ]</span> ${s.value} (-${price.toLocaleString()}đ)`);
    localStorage.setItem(currentUser, JSON.stringify(data));
    refreshUserUI();
    alert("Mua thành công! Vui lòng đợi Admin vào cày.");
    return true;
    }
    

    function validateCard() {
        const seri = document.getElementById('card-seri').value.trim();
        const code = document.getElementById('card-code').value.trim();
        const val = document.getElementById('card-value').value;
        const type = document.getElementById('card-type').value;
        if(seri === "" || code === "") { alert("Nhập đủ thông tin!"); return false; }

        const data = JSON.parse(localStorage.getItem(currentUser));
        const log = `<span style="color: #ff9800;">[CHỜ DUYỆT]</span> ${type} ${parseInt(val).toLocaleString()}đ`;
        data.history.unshift(log);
        localStorage.setItem(currentUser, JSON.stringify(data));
        alert("Gửi thẻ thành công!");
        return true;
    }

        function checkPendingMoney() {
    const target = document.getElementById('admin-target-user').value.trim();
    const infoDiv = document.getElementById('admin-pending-info');
    let userData = localStorage.getItem(target);

    if (userData && infoDiv) {
        let data = JSON.parse(userData);
        let total = 0;
        if (data.history) {
            data.history.forEach(item => {
                // Chỉ quét những dòng có chữ [CHỜ DUYỆT]
                if (item.includes('[CHỜ DUYỆT]')) {
                    // Tách lấy phần số đứng trước chữ 'đ' và xóa dấu chấm
                    let parts = item.split(' '); 
                    let priceStr = parts[parts.length - 1]; // Lấy phần cuối cùng (ví dụ: 10.000đ)
                    let cleanNumber = priceStr.replace(/\./g, '').replace('đ', '');
                    
                    let num = parseInt(cleanNumber);
                    if (!isNaN(num)) total += num;
                }
            });
        }
        
        if (total > 0) {
            infoDiv.innerHTML = `💰 Đang nạp: ${total.toLocaleString()}đ`;
            document.getElementById('admin-amount').value = total;
        } else {
            infoDiv.innerHTML = "❌ Không có tiền chờ";
            document.getElementById('admin-amount').value = "";
        }
    } else if (infoDiv) {
        infoDiv.innerHTML = "";
    }
    }
    
    function adminUpdate(type) {
        const target = document.getElementById('admin-target-user').value.trim();
        let amount = parseInt(document.getElementById('admin-amount').value);
        if (!target || isNaN(amount)) return alert("Nhập đủ tên và số tiền!");

        let userData = localStorage.getItem(target);
        if (userData) {
            let data = JSON.parse(userData);
            let finalAmount = (type === 1) ? amount : -amount;
            data.balance += finalAmount;
            
            // Sửa lỗi đóng ngoặc ở đây (Thay cho đoạn trong ảnh 6723)
            if (type === 1) {
                data.history = data.history.map(item => {
                    return item.replace('[CHỜ DUYỆT]', '<b style="color: #00ff88;">[ĐÃ XONG]</b>');
                });
            }
            
            data.history.unshift(`<span style="color: #00ff88;">[HỆ THỐNG]</span> ${finalAmount > 0 ? '+' : ''}${finalAmount.toLocaleString()}đ`);
            localStorage.setItem(target, JSON.stringify(data));
            alert("Thành công!");
            location.reload();
        } else alert("Sai tài khoản!");
    }

    function adminReject() {
        const target = document.getElementById('admin-target-user').value.trim();
        let userData = localStorage.getItem(target);
        if (userData) {
            let data = JSON.parse(userData);
            data.history = data.history.map(item => item.replace('[CHỜ DUYỆT]', '<b style="color: #ff4444;">[THẺ SAI/HỦY]</b>'));
            localStorage.setItem(target, JSON.stringify(data));
            alert("Đã hủy đơn!");
            location.reload();
        }
    }

    function loadHistory() {
        const data = JSON.parse(localStorage.getItem(currentUser));
        const list = document.getElementById('history-list');
        if(data && data.history && data.history.length > 0) {
            list.innerHTML = data.history.map(h => `<div class="history-item">${h}</div>`).join('');
        } else {
            list.innerHTML = '<div class="history-item">Chưa có giao dịch.</div>';
        }
    }

    function checkAdmin() {
        let p = prompt("Mã Admin:");
        if(p === "123456") document.getElementById('admin-section').style.display = 'block';
    }

    function logout() {
        localStorage.removeItem('sessionUser');
        location.reload();
    }
</script>
</body>
