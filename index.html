    <style>
        /* ==========================================================================
           1. HỆ THỐNG BIẾN CORE (CORE VARIABLES)
           ========================================================================== */
        :root {
            /* Tông màu chủ đạo: Cyan Neon & Purple Cyber */
            --primary: #00f2ff;
            --primary-glow: rgba(0, 242, 255, 0.5);
            --secondary: #7000ff;
            --secondary-glow: rgba(112, 0, 255, 0.5);
            
            /* Màu trạng thái */
            --success: #00ff88;
            --warning: #ffb300;
            --danger: #ff3131;
            
            /* Nền và Bố cục chuyên nghiệp */
            --bg-body: #050505;
            --bg-card: rgba(15, 15, 15, 0.98);
            --bg-input: #000000;
            --border-color: rgba(255, 255, 255, 0.1);
            
            /* Typography */
            --font-main: 'Quicksand', sans-serif;
            --font-gaming: 'Orbitron', sans-serif;
            
            /* Bo tròn theo yêu cầu (20px) */
            --radius-lg: 20px;
            --radius-md: 12px;
            --radius-sm: 8px;

            /* Hiệu ứng chuyển cảnh */
            --transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ==========================================================================
           2. RESET & BASE STYLES (CHỮ SIÊU ĐẬM)
           ========================================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-body);
            color: #ffffff;
            font-family: var(--font-main);
            font-weight: 700; /* THIẾT LẬP CHỮ ĐẬM TOÀN HỆ THỐNG */
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            /* Nền Gradient mờ ảo */
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(0, 242, 255, 0.05) 0%, transparent 30%),
                radial-gradient(circle at 90% 90%, rgba(112, 0, 255, 0.05) 0%, transparent 30%);
        }

        .app-container {
            width: 100%;
            max-width: 480px; /* Chuẩn mobile gaming */
            padding: 20px 15px;
            position: relative;
            z-index: 10;
        }

        /* Lớp phủ hiệu ứng hạt (Hàng trăm dòng CSS sau này sẽ dựa vào đây) */
        .scanline {
            width: 100%;
            height: 100px;
            z-index: 5;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(0, 242, 255, 0.02) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1;
            position: fixed;
            bottom: 100%;
            pointer-events: none;
        }

        h1, h2, h3, .btn-text {
            font-family: var(--font-gaming);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .hidden { display: none !important; }
                /* ==========================================================================
           3. HIỆU ỨNG BOX (BOX GLASS & GLOW) - BO TRÒN 20PX
           ========================================================================== */
        .box {
            width: 100%;
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 25px;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8);
            margin-bottom: 20px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            transition: var(--transition);
        }

        /* Viền sáng phía trên để tạo độ khối */
        .box::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            opacity: 0.5;
        }

        /* 4. LOGO & HEADER ANIMATION */
        .logo-wrapper {
            text-align: center;
            padding: 40px 0;
        }

        .main-title {
            font-size: 2.5rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 15px var(--primary-glow), 0 0 30px var(--primary-glow);
            letter-spacing: 5px;
            animation: glitch 3s infinite;
        }

        @keyframes glitch {
            0% { text-shadow: 2px 0 var(--danger), -2px 0 var(--primary); }
            50% { text-shadow: -2px 0 var(--danger), 2px 0 var(--primary); }
            100% { text-shadow: 2px 0 var(--danger), -2px 0 var(--primary); }
        }

        /* 5. GIAO DIỆN CHÍNH: 2 NÚT MENU (HUB NAVIGATION) */
        .hub-menu {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .hub-item {
            height: 140px;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-lg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: var(--transition);
        }

        /* Hiệu ứng viền Neon chạy vòng quanh khi Hover/Active */
        .hub-item::after {
            content: '';
            position: absolute;
            width: 150%; height: 150%;
            background: conic-gradient(transparent, transparent, transparent, var(--primary));
            animation: rotate 4s linear infinite;
            opacity: 0;
            transition: 0.3s;
        }

        .hub-item:hover::after, .hub-item.active::after { opacity: 1; }
        
        /* Lớp phủ bên trong để giữ nội dung không bị quay theo viền */
        .hub-inner {
            position: absolute;
            inset: 3px;
            background: #0f0f0f;
            border-radius: 17px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }

        .hub-item i {
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 12px;
            filter: drop-shadow(0 0 8px var(--primary-glow));
        }

        .hub-item span {
            font-family: var(--font-gaming);
            font-weight: 800;
            font-size: 0.8rem;
            letter-spacing: 1px;
            color: #fff;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 6. HỆ THỐNG NÚT BẤM (BUTTONS) - SIÊU ĐẬM */
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: var(--radius-md);
            font-family: var(--font-gaming);
            font-weight: 900;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: var(--transition);
            text-transform: uppercase;
        }

        .btn-primary {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .btn-primary:active { transform: scale(0.96); filter: brightness(1.2); }

        .btn-secondary {
            background: transparent;
            border: 2px solid var(--secondary);
            color: var(--secondary);
        }

        /* 7. INPUT FIELDS */
        .input-box {
            margin-bottom: 18px;
        }

        .input-box label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: var(--primary);
            font-weight: 800;
        }

        input, select {
            width: 100%;
            padding: 14px 18px;
            background: var(--bg-input);
            border: 1px solid #333;
            border-radius: var(--radius-md);
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 12px var(--primary-glow);
        }

        /* 8. STATUS CHỮ CỰC ĐẬM */
        .status-badge {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 900;
            text-transform: uppercase;
        }

        .success { background: rgba(0, 255, 136, 0.1); color: var(--success); border: 1px solid var(--success); }
                /* 9. HIỆU ỨNG CHUYỂN CẢNH MƯỢT MÀ */
        .fade-in-up {
            animation: fadeInUp 0.5s ease forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 10. PHẦN TRANG TRÍ PHỤ (DECORATION) */
        .neon-line {
            width: 100%; height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            margin: 20px 0;
            opacity: 0.3;
        }
    </style>
</head>

            isLoggedIn: false,
            currentUser: null,
            users: {}, // Lưu danh sách tài khoản: {username: {password, balance, history}}
            activeTab: 'hub'
        };

        // Hàm lưu dữ liệu vào bộ nhớ trình duyệt
        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(store));
        }

        /* ==========================================================================
           12. LOGIC XÁC THỰC (AUTH LOGIC)
           ========================================================================== */
        let isRegisterMode = false;

        function toggleAuth() {
            isRegisterMode = !isRegisterMode;
            const title = document.querySelector('#auth-box h2');
            const btnText = document.querySelector('#auth-box .btn-text');
            const toggleLink = document.querySelector('#auth-box div span:last-child');

            if (isRegisterMode) {
                title.innerText = "TẠO TÀI KHOẢN MỚI";
                btnText.innerText = "ĐĂNG KÝ NGAY";
                toggleLink.innerText = "Đăng nhập tại đây";
            } else {
                title.innerText = "HỆ THỐNG ĐĂNG NHẬP";
                btnText.innerText = "TRUY CẬP NGAY";
                toggleLink.innerText = "Đăng ký tại đây";
            }
        }

        function handleLogin() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();

            if (!user || !pass) {
                showToast("Vui lòng điền đầy đủ thông tin!", "danger");
                return;
            }

            if (isRegisterMode) {
                // Logic Đăng ký
                if (store.users[user]) {
                    showToast("Tài khoản đã tồn tại!", "danger");
                } else {
                    store.users[user] = { password: pass, balance: 0, history: [] };
                    showToast("Đăng ký thành công! Hãy đăng nhập.", "success");
                    toggleAuth();
                }
            } else {
                // Logic Đăng nhập
                if (store.users[user] && store.users[user].password === pass) {
                    store.isLoggedIn = true;
                    store.currentUser = user;
                    showToast("Đăng nhập thành công!", "success");
                    renderUI();
                } else {
                    showToast("Sai tài khoản hoặc mật khẩu!", "danger");
                }
            }
            saveData();
        }

        function handleLogout() {
            if(confirm("Bạn muốn đăng xuất khỏi hệ thống?")) {
                store.isLoggedIn = false;
                store.currentUser = null;
                saveData();
                location.reload();
            }
        }

        /* ==========================================================================
           13. ĐIỀU KHIỂN GIAO DIỆN (UI CONTROLLER)
           ========================================================================== */
        function renderUI() {
            const authBox = document.getElementById('auth-box');
            const mainInt = document.getElementById('main-interface');
            
            if (store.isLoggedIn) {
                authBox.classList.add('hidden');
                mainInt.classList.remove('hidden');
                
                // Cập nhật thông tin User
                document.getElementById('display-user').innerText = store.currentUser.toUpperCase();
                const currentBalance = store.users[store.currentUser].balance;
                document.getElementById('user-balance').innerText = currentBalance.toLocaleString() + "đ";
                
                renderHistory();
            } else {
                authBox.classList.remove('hidden');
                mainInt.classList.add('hidden');
            }
        }

        function showTab(tabName) {
            document.getElementById('hub-navigation').classList.add('hidden');
            if (tabName === 'topup') {
                document.getElementById('topup-area').classList.remove('hidden');
            } else if (tabName === 'service') {
                document.getElementById('service-area').classList.remove('hidden');
            }
            store.activeTab = tabName;
            saveData();
        }

        function backToHub() {
            document.getElementById('hub-navigation').classList.remove('hidden');
            document.getElementById('topup-area').classList.add('hidden');
            document.getElementById('service-area').classList.add('hidden');
            store.activeTab = 'hub';
            saveData();
        }

        /* ==========================================================================
           14. LOGIC DỊCH VỤ & TÍNH TOÁN
           ========================================================================== */
        function calcPrice() {
            const select = document.getElementById('service-type');
            const price = parseInt(select.value);
            const display = document.getElementById('price-display');
            
            display.innerText = price.toLocaleString() + "đ";
            
            if (price > 0) {
                display.style.textShadow = "0 0 15px var(--secondary-glow)";
            } else {
                display.style.textShadow = "none";
            }
        }

        function processService() {
            const user = store.currentUser;
            const price = parseInt(document.getElementById('service-type').value);
            const serviceName = document.getElementById('service-type').options[document.getElementById('service-type').selectedIndex].text;

            if (price === 0) {
                showToast("Vui lòng chọn dịch vụ!", "warning");
                return;
            }

            if (store.users[user].balance < price) {
                showToast("Số dư không đủ! Vui lòng nạp thêm.", "danger");
                return;
            }

            // Trừ tiền và lưu lịch sử
            store.users[user].balance -= price;
            const log = {
                time: new Date().toLocaleString(),
                content: `Đã mua: ${serviceName}`,
                type: 'buy'
            };
            store.users[user].history.push(log);
            
            showToast("Thanh toán thành công! Đang xử lý đơn hàng.", "success");
            saveData();
            renderUI();
        }

        function renderHistory() {
            const container = document.getElementById('history-container');
            const history = store.users[store.currentUser].history;
            
            if (history.length === 0) {
                container.innerHTML = `<div style="text-align:center; color:#444; padding:20px;">Chưa có hoạt động...</div>`;
                return;
            }

            container.innerHTML = history.slice().reverse().map(item => `
                <div style="background:rgba(255,255,255,0.02); padding:12px; border-radius:10px; margin-bottom:10px; border-left: 3px solid ${item.type === 'buy' ? 'var(--secondary)' : 'var(--success)'}">
                    <div style="font-size:0.65rem; color:#666;">${item.time}</div>
                    <div style="font-size:0.85rem; font-weight:700;">${item.content}</div>
                </div>
            `).join('');
        }
                /* ==========================================================================
           15. HỆ THỐNG THÔNG BÁO (TOAST NOTIFICATION)
           ========================================================================== */
        function showToast(msg, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `fade-in-up`;
            
            // Style cho Toast ngay tại đây để tối ưu hiệu năng
            const colors = {
                success: 'var(--success)',
                danger: 'var(--danger)',
                warning: 'var(--warning)'
            };

            Object.assign(toast.style, {
                position: 'fixed',
                top: '20px',
                left: '50%',
                transform: 'translateX(-50%)',
                zIndex: '9999',
                background: 'rgba(10, 10, 10, 0.95)',
                padding: '15px 25px',
                borderRadius: '12px',
                border: `1px solid ${colors[type]}`,
                color: '#fff',
                fontSize: '0.85rem',
                fontWeight: '900',
                boxShadow: `0 0 20px ${colors[type]}44`,
                display: 'flex',
                alignItems: 'center',
                gap: '12px',
                minWidth: '280px',
                textAlign: 'center'
            });

            const icon = type === 'success' ? 'check-circle' : 'triangle-exclamation';
            toast.innerHTML = `<i class="fa-solid fa-${icon}" style="color:${colors[type]}"></i> ${msg}`;

            document.body.appendChild(toast);

            // Tự động xóa sau 3 giây
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = '0.5s';
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        /* ==========================================================================
           16. LOGIC NẠP THẺ (TOPUP SYSTEM)
           ========================================================================== */
        function processTopup() {
            const user = store.currentUser;
            const cardValue = parseInt(document.getElementById('card-value').value);
            
            // Giả lập xử lý nạp thẻ
            showToast("Đang gửi yêu cầu nạp thẻ...", "warning");
            
            setTimeout(() => {
                store.users[user].balance += cardValue;
                const log = {
                    time: new Date().toLocaleString(),
                    content: `Nạp thẻ thành công: +${cardValue.toLocaleString()}đ`,
                    type: 'topup'
                };
                store.users[user].history.push(log);
                
                showToast(`Nạp thành công ${cardValue.toLocaleString()}đ!`, "success");
                saveData();
                renderUI();
                backToHub();
            }, 2000);
        }

        /* ==========================================================================
           17. HỆ THỐNG ADMIN BACKDOOR (CẬP NHẬT TIỀN NHANH)
           Gõ lệnh: "admin" + [Dấu cách] + [Số tiền] vào ô Username 
           sau đó nhấn Đăng nhập để kích hoạt lệnh ẩn.
           ========================================================================== */
        function checkAdminCommand(input) {
            if (input.startsWith('admin ')) {
                const amount = parseInt(input.split(' ')[1]);
                if (!isNaN(amount) && store.currentUser) {
                    store.users[store.currentUser].balance += amount;
                    showToast(`ADMIN: Đã cộng ${amount.toLocaleString()}đ!`, "success");
                    saveData();
                    renderUI();
                    return true;
                }
            }
            return false;
        }

        // Chỉnh sửa lại hàm handleLogin một chút để nhận lệnh Admin
        const originalLogin = handleLogin;
        handleLogin = function() {
            const userVal = document.getElementById('username').value;
            if (checkAdminCommand(userVal)) {
                document.getElementById('username').value = "";
                return;
            }
            originalLogin();
        };

        /* ==========================================================================
           18. KHỞI CHẠY (INITIALIZATION)
           ========================================================================== */
        window.addEventListener('DOMContentLoaded', () => {
            renderUI();
            
            // Khôi phục Tab cũ nếu đang dùng dở
            if (store.isLoggedIn && store.activeTab !== 'hub') {
                showTab(store.activeTab);
            }
        });

    </script>
</body>
</html>
